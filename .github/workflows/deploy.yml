name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Coolify API
        uses: appleboy/ssh-action@v1
        with:
          host: 163.44.103.9
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -s -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" "http://localhost:8000/api/v1/deploy?uuid=op7cede4d1v24i72qn39txs7&force=true"
